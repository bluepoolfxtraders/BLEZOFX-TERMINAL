<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blue Pool FX Elite</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b0f19;color:white;}
.card{background:#111827;padding:15px;margin:10px;border-radius:10px;}
.btn{padding:10px;background:#22c55e;border:none;color:white;cursor:pointer;}
.lock{filter:blur(5px);}
input,select{padding:10px;width:100%;margin:5px 0;background:#1f2937;color:white;border:none;}
.sidebar{width:220px;position:fixed;height:100%;background:#020617;padding:10px;}
.main{margin-left:220px;padding:20px;}
</style>
</head>

<body>

<div id="auth"></div>

<div id="app" style="display:none;">

<div class="sidebar">
<h3>BP FX</h3>
<button onclick="load('dashboard')">Dashboard</button>
<button onclick="load('trade')">Trade</button>
<button onclick="load('signals')">Signals</button>
<button onclick="load('lessons')">Lessons</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main" id="panel"></div>

</div>

<script>

// USERS
let users = JSON.parse(localStorage.getItem("users")||"[]");

// AUTH
function showAuth(){
auth.innerHTML=`
<h2>Login / Register</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<select id="session">
<option>London</option>
<option>NewYork</option>
<option>Tokyo</option>
</select>

<label><input type="checkbox" id="premium"> I am Premium</label>

<button class="btn" onclick="register()">Register</button>
<button class="btn" onclick="login()">Login</button>
`;
}

function register(){
users.push({
u:u.value,
p:p.value,
session:session.value,
premium:premium.checked
});
localStorage.setItem("users",JSON.stringify(users));
alert("Registered");
}

function login(){
let user = users.find(x=>x.u===u.value && x.p===p.value);
if(!user) return alert("Invalid");

localStorage.setItem("current",JSON.stringify(user));
startApp();
}

// START
function startApp(){
auth.style.display="none";
app.style.display="block";
load("dashboard");
}

// LOAD PANELS
function load(type){

// DASHBOARD
if(type==="dashboard"){
panel.innerHTML=`
<h2>Dashboard</h2>

<div class="card">
<h3>Live Forex</h3>
<div id="rates"></div>
</div>

<div class="card">
<h3>Upgrade to Premium</h3>
<button class="btn" onclick="window.open('https://payhip.com/b/nwOL4')">
Unlock Premium Signals
</button>
</div>
`;
getRates();
}

// TRADE
if(type==="trade"){
let user = JSON.parse(localStorage.getItem("current"));

panel.innerHTML=`<h2>Trade Panel</h2><div id="tradeBox"></div>`;
checkSession(user.session);
}

// SIGNALS
if(type==="signals"){
let user = JSON.parse(localStorage.getItem("current"));

panel.innerHTML=`
<h2>Signals</h2>

<div class="card">
<h3>Create Signal</h3>
<input id="pair">
<select id="dir"><option>BUY</option><option>SELL</option></select>
<input id="entry">
<input id="sl">
<input id="tp">
<button class="btn" onclick="addSignal()">Add</button>
</div>

<div class="card">
<h3>Signals Feed</h3>
<div id="signalsList"></div>
</div>
`;

loadSignals(user.premium);
}

// LESSONS
if(type==="lessons"){
panel.innerHTML=`<h2>Lessons</h2><div class="card">Full course inside</div>`;
}

}

// PREMIUM LOCK SIGNALS
function loadSignals(isPremium){
let s = JSON.parse(localStorage.getItem("signals")||"[]");

signalsList.innerHTML = s.map(x=>`
<div class="card ${isPremium ? '' : 'lock'}">
${x.pair} | ${x.dir}<br>
Entry: ${x.entry}<br>
SL: ${x.sl} | TP: ${x.tp}
</div>
`).join("");

if(!isPremium){
signalsList.innerHTML += `
<div class="card">
<h3>🔒 Premium Required</h3>
<button class="btn" onclick="window.open('https://payhip.com/b/nwOL4')">
Unlock Now
</button>
</div>`;
}
}

// ADD SIGNAL
function addSignal(){
let s = JSON.parse(localStorage.getItem("signals")||"[]");

s.push({
pair:pair.value,
dir:dir.value,
entry:entry.value,
sl:sl.value,
tp:tp.value
});

localStorage.setItem("signals",JSON.stringify(s));
loadSignals(true);
}

// FOREX
function getRates(){
fetch("https://api.exchangerate-api.com/v4/latest/USD")
.then(res=>res.json())
.then(data=>{
rates.innerHTML=`EUR/USD ${(1/data.rates.EUR).toFixed(4)}`;
});
}

// SESSION LOCK
function checkSession(selected){
let h=new Date().getUTCHours();
let current = h>=7&&h<16?"London":h>=13&&h<22?"NewYork":"Tokyo";

tradeBox.innerHTML = current===selected
? "✅ Trade Allowed"
: "🚫 Locked ("+current+")";
}

// LOGOUT
function logout(){
localStorage.removeItem("current");
location.reload();
}

// INIT
if(localStorage.getItem("current")) startApp();
else showAuth();

</script>

</body>
</html>
