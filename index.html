<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blue Pool FX Terminal</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#010409;
    color:#e6edf3;
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:230px;
    background:#0d1117;
    height:100vh;
    padding:10px;
    overflow-y:auto;
}

.sidebar h2 { color:#00d4ff; }

.sidebar button {
    width:100%;
    padding:10px;
    margin:4px 0;
    background:none;
    border:none;
    color:white;
    text-align:left;
    cursor:pointer;
}

.sidebar button:hover { background:#161b22; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar {
    padding:10px;
    border-bottom:1px solid #30363d;
}

/* PANEL */
.panel {
    flex:1;
    padding:10px;
    overflow:auto;
}

/* INPUT */
input, textarea {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#161b22;
    border:none;
    color:white;
}

/* BUTTON */
.btn {
    background:#00d4ff;
    border:none;
    padding:10px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

/* CHAT */
.chat-box {
    height:200px;
    overflow-y:auto;
    border:1px solid #30363d;
    padding:10px;
}

/* LOGIN */
.login {
    max-width:400px;
    margin:100px auto;
}

/* MOBILE */
@media(max-width:768px){
.sidebar { width:70px; }
.sidebar button { font-size:10px; }
}
</style>
</head>

<body>

<div class="sidebar">
<h2>BP FX</h2>

<button onclick="loadPanel('dashboard')">📊</button>
<button onclick="loadPanel('chart')">📈</button>
<button onclick="loadPanel('chat')">💬</button>
<button onclick="loadPanel('calculator')">🧮</button>
<button onclick="loadPanel('calendar')">📅</button>
<button onclick="loadPanel('investing')">🌍</button>
<button onclick="loadPanel('notebook')">🗒</button>
<button onclick="loadPanel('journal')">📓</button>
<button onclick="loadPanel('lessons')">📚</button>
<button onclick="logout()">🚪</button>

</div>

<div class="main">

<div class="topbar">
<h3>Blue Pool FX Terminal</h3>
</div>

<div class="panel" id="panel"></div>

</div>

<script>

// LOGIN SYSTEM
if(!localStorage.getItem("user")){
document.body.innerHTML = `
<div class="login">
<h2>Login / Sign Up</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Enter</button>
</div>
`;
}

function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(!u || !p) return alert("Enter details");

localStorage.setItem("user", JSON.stringify({u,p}));
location.reload();
}

// PANEL LOADER
function loadPanel(type){

if(type==="dashboard"){
panel.innerHTML = `
<h2>Dashboard</h2>
<p>Profit: <span id="profit">0</span></p>
<p>Trades: <span id="trades">0</span></p>
<p>Win Rate: <span id="winrate">0%</span></p>
`;
loadStats();
}

if(type==="chart"){
panel.innerHTML = `
<iframe src="https://www.tradingview.com/widgetembed/?symbol=FX:XAUUSD&theme=dark"
style="width:100%;height:400px;border:none;"></iframe>
`;
}

if(type==="calculator"){
panel.innerHTML = `
<h2>Forex Calculator</h2>
<button class="btn" onclick="window.open('https://www.myfxbook.com/forex-calculators')">
Open Calculator
</button>
`;
}

if(type==="calendar"){
panel.innerHTML = `
<h2>Forex Calendar</h2>
<button class="btn" onclick="window.open('https://www.forexfactory.com/calendar')">
Open Forex Factory
</button>
`;
}

if(type==="investing"){
panel.innerHTML = `
<h2>Market Tools</h2>
<button class="btn" onclick="window.open('https://www.investing.com')">
Open Investing
</button>
`;
}

if(type==="notebook"){
panel.innerHTML = `
<h2>Notebook</h2>
<textarea id="notes"></textarea>
<button class="btn" onclick="saveNotes()">Save Notes</button>
`;
loadNotes();
}

if(type==="chat"){
panel.innerHTML = `
<h2>Community Chat (Local)</h2>
<div class="chat-box" id="chatBox"></div>
<input id="msg">
<button class="btn" onclick="sendMsg()">Send</button>
`;
loadChat();
}

if(type==="journal"){
panel.innerHTML = `
<h2>Journal</h2>
<input id="amount" placeholder="Profit / Loss">
<button class="btn" onclick="addTrade()">Add Trade</button>
<div id="journal"></div>
`;
loadJournal();
}

if(type==="lessons"){
panel.innerHTML = `
<h2>Forex Course</h2>
<p>Full beginner to advanced content.</p>

<h3>Premium</h3>
<button class="btn" onclick="window.open('https://payhip.com/b/nwOL4')">
Unlock Premium
</button>
`;
}

}

// TRADES
function addTrade(){
let trades=JSON.parse(localStorage.getItem("trades")||"[]");
trades.push(parseFloat(amount.value));
localStorage.setItem("trades", JSON.stringify(trades));
loadStats();
loadJournal();
}

// STATS
function loadStats(){
let trades=JSON.parse(localStorage.getItem("trades")||"[]");
let total=0,wins=0;
trades.forEach(t=>{total+=t;if(t>0)wins++;});
profit.innerText=total;
document.getElementById("trades").innerText=trades.length;
winrate.innerText=trades.length?Math.round((wins/trades.length)*100)+"%":"0%";
}

// JOURNAL
function loadJournal(){
let trades=JSON.parse(localStorage.getItem("trades")||"[]");
journal.innerHTML=trades.map(t=>`<div>${t}</div>`).join("");
}

// CHAT
function sendMsg(){
let chat=JSON.parse(localStorage.getItem("chat")||"[]");
chat.push(msg.value);
localStorage.setItem("chat", JSON.stringify(chat));
loadChat();
}

function loadChat(){
let chat=JSON.parse(localStorage.getItem("chat")||"[]");
chatBox.innerHTML=chat.map(m=>`<div>${m}</div>`).join("");
}

// NOTES
function saveNotes(){
localStorage.setItem("notes", notes.value);
}

function loadNotes(){
notes.value = localStorage.getItem("notes") || "";
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// INIT
loadPanel("dashboard");

</script>

</body>
    </html>
